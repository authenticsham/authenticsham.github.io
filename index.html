<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>我的个人网站</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="description" content="这是我的个人主页 / 简历 / 作品集。" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>你的名字</h1>
      <p class="subtitle">一句话介绍你自己</p>
    </div>
  </header>

  <main class="container">
    <section id="about">
      <h2>关于我</h2>
      <p>写一段自我介绍：工作、技能、兴趣。</p>
    </section>

    <section id="works">
      <h2>作品 / 项目</h2>
      <ul class="cards">
        <li class="card">
          <h3>项目名称</h3>
          <p>简短描述。<a href="#">查看</a></p>
        </li>
      </ul>
    </section>

    <section id="contact">
      <h2>联系我</h2>
      <p>邮箱：yourname@example.com</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> 你的名字</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
